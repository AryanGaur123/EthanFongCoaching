<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Atmospheric hero backdrop — aurora glow, perspective grid, and a parabolic jump trajectory</title>
  <defs>
    <!-- Deep near-black base -->
    <radialGradient id="baseGlow" cx="72%" cy="26%" r="90%">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="42%" stop-color="#070a12"/>
      <stop offset="100%" stop-color="#050507"/>
    </radialGradient>
    <linearGradient id="baseVertical" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060709" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Aurora orbs -->
    <radialGradient id="auroraTR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4f8bff" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#2f6bff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="auroraBL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1b3fd1" stop-opacity="0.4"/>
      <stop offset="55%" stop-color="#1b3fd1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1b3fd1" stop-opacity="0"/>
    </radialGradient>

    <!-- Arc gradient + glow -->
    <linearGradient id="arcStroke" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b3fd1" stop-opacity="0.15"/>
      <stop offset="35%" stop-color="#2f6bff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4f8bff"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="20%" stop-color="#4f8bff"/>
      <stop offset="55%" stop-color="#2f6bff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="arcBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f8bff" stop-opacity="0"/>
      <stop offset="55%" stop-color="#4f8bff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#4f8bff" stop-opacity="0.32"/>
    </linearGradient>
    <linearGradient id="baselineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f6bff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4f8bff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2f6bff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1600" height="900" fill="url(#baseGlow)"/>
  <rect width="1600" height="900" fill="url(#baseVertical)"/>

  <!-- Aurora glows -->
  <ellipse cx="1240" cy="200" rx="520" ry="380" fill="url(#auroraTR)" filter="url(#softBlur)"/>
  <ellipse cx="260" cy="820" rx="460" ry="320" fill="url(#auroraBL)" filter="url(#softBlur)"/>

  <!-- Perspective / blueprint grid converging to vanishing point (~800,150) -->
  <g stroke="url(#gridFade)" stroke-width="1" opacity="0.7">
    <!-- converging longitudinal lines -->
    <line x1="800" y1="150" x2="-260" y2="900"/>
    <line x1="800" y1="150" x2="120" y2="900"/>
    <line x1="800" y1="150" x2="430" y2="900"/>
    <line x1="800" y1="150" x2="680" y2="900"/>
    <line x1="800" y1="150" x2="920" y2="900"/>
    <line x1="800" y1="150" x2="1170" y2="900"/>
    <line x1="800" y1="150" x2="1480" y2="900"/>
    <line x1="800" y1="150" x2="1860" y2="900"/>
    <!-- horizontal depth lines (closer spacing near horizon) -->
    <line x1="0" y1="470" x2="1600" y2="470" opacity="0.5"/>
    <line x1="0" y1="540" x2="1600" y2="540" opacity="0.6"/>
    <line x1="0" y1="625" x2="1600" y2="625" opacity="0.7"/>
    <line x1="0" y1="730" x2="1600" y2="730" opacity="0.85"/>
    <line x1="0" y1="860" x2="1600" y2="860"/>
  </g>

  <!-- Baseline -->
  <rect x="120" y="742" width="1360" height="2" fill="url(#baselineGrad)"/>
  <!-- distance tick markers along baseline -->
  <g stroke="#4f8bff" stroke-width="1.5" opacity="0.45">
    <line x1="300" y1="736" x2="300" y2="750"/>
    <line x1="520" y1="736" x2="520" y2="750"/>
    <line x1="740" y1="736" x2="740" y2="750"/>
    <line x1="960" y1="736" x2="960" y2="750"/>
    <line x1="1180" y1="734" x2="1180" y2="752"/>
    <line x1="1400" y1="732" x2="1400" y2="754"/>
  </g>

  <!-- Parabolic jump trajectory: launch left-baseline, apex mid, land right -->
  <g fill="none" stroke-linecap="round">
    <!-- glow underlay -->
    <path d="M 300 742 Q 830 120 1400 742" stroke="url(#arcStroke)" stroke-width="10" opacity="0.5" filter="url(#arcBlur)"/>
    <!-- crisp arc -->
    <path d="M 300 742 Q 830 120 1400 742" stroke="url(#arcStroke)" stroke-width="3"/>
    <!-- faint dashed guide echo -->
    <path d="M 300 742 Q 830 120 1400 742" stroke="#4f8bff" stroke-width="1" stroke-dasharray="2 12" opacity="0.35"/>
  </g>

  <!-- Apex glowing dot -->
  <circle cx="850" cy="304" r="46" fill="url(#dotGlow)"/>
  <circle cx="850" cy="304" r="6" fill="#ffffff"/>
  <circle cx="850" cy="304" r="12" fill="none" stroke="#4f8bff" stroke-width="1.2" opacity="0.7"/>

  <!-- Leading dot at landing end -->
  <circle cx="1400" cy="742" r="30" fill="url(#dotGlow)" opacity="0.85"/>
  <circle cx="1400" cy="742" r="4.5" fill="#ffffff"/>

  <!-- Vignette to keep it dim behind text -->
  <rect width="1600" height="900" fill="url(#baseVertical)" opacity="0.35"/>
</svg>
