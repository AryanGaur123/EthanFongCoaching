<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="heroTitle">
  <title id="heroTitle">Hero image placeholder — dynamic jumper in motion</title>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2430"/>
      <stop offset="0.55" stop-color="#151a22"/>
      <stop offset="1" stop-color="#0d1119"/>
    </linearGradient>
    <linearGradient id="streakBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0055A2" stop-opacity="0"/>
      <stop offset="1" stop-color="#0055A2" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="streakGold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#E5A823" stop-opacity="0"/>
      <stop offset="1" stop-color="#E5A823" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <!-- Charcoal backdrop -->
  <rect width="1600" height="900" fill="url(#heroBg)"/>

  <!-- Abstract angular runway planes -->
  <polygon points="0,900 700,900 200,420" fill="#0055A2" opacity="0.10"/>
  <polygon points="1600,900 900,900 1400,360" fill="#E5A823" opacity="0.07"/>
  <polygon points="0,640 1600,300 1600,360 0,720" fill="#0055A2" opacity="0.06"/>

  <!-- Motion streaks -->
  <g>
    <rect x="120" y="300" width="620" height="10" rx="5" fill="url(#streakBlue)"/>
    <rect x="220" y="360" width="520" height="7" rx="3.5" fill="url(#streakGold)"/>
    <rect x="80" y="430" width="700" height="6" rx="3" fill="url(#streakBlue)"/>
    <rect x="300" y="520" width="460" height="8" rx="4" fill="url(#streakGold)" opacity="0.7"/>
  </g>

  <!-- Stylized jumper mid-flight (geometric silhouette) -->
  <g transform="translate(880 210)" fill="#E5A823">
    <!-- trail glow -->
    <path d="M-120 300 L60 120 L120 150 L-70 340 Z" fill="#0055A2" opacity="0.25"/>
    <!-- head -->
    <circle cx="250" cy="70" r="42"/>
    <!-- torso -->
    <path d="M210 110 L300 150 L270 300 L200 280 Z"/>
    <!-- leading arm -->
    <path d="M300 150 L430 90 L448 122 L318 190 Z"/>
    <!-- trailing arm -->
    <path d="M212 130 L110 210 L96 178 L196 100 Z"/>
    <!-- lead leg extended -->
    <path d="M262 290 L400 360 L384 398 L238 330 Z"/>
    <!-- trail leg tucked -->
    <path d="M214 280 L150 400 L188 418 L262 320 Z"/>
  </g>

  <!-- Sand pit line -->
  <rect x="0" y="820" width="1600" height="80" fill="#E5A823" opacity="0.05"/>

  <!-- Placeholder label -->
  <text x="48" y="856" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#ffffff" opacity="0.30" letter-spacing="1">[hero image placeholder]</text>
</svg>
