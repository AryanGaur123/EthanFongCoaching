<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" width="100%" height="100%" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="headshotTitle">
  <title id="headshotTitle">Headshot placeholder — Ethan Fong</title>
  <defs>
    <linearGradient id="portraitBg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#0055A2"/>
      <stop offset="0.6" stop-color="#1c2430"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
  </defs>

  <rect width="640" height="720" fill="url(#portraitBg)"/>

  <!-- Subtle angular accent -->
  <polygon points="0,720 260,720 0,470" fill="#E5A823" opacity="0.10"/>
  <polygon points="640,0 640,240 420,0" fill="#E5A823" opacity="0.08"/>

  <!-- Geometric bust / avatar silhouette -->
  <g transform="translate(320 300)">
    <!-- shoulders -->
    <path d="M-190 200 C-190 90 -100 40 0 40 C100 40 190 90 190 200 L190 260 L-190 260 Z" fill="#E5A823"/>
    <!-- head -->
    <circle cx="0" cy="-70" r="120" fill="#ffffff"/>
    <!-- neck -->
    <rect x="-42" y="20" width="84" height="60" fill="#ffffff"/>
  </g>

  <!-- Placeholder label -->
  <text x="320" y="660" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#ffffff" opacity="0.85" letter-spacing="1">[headshot placeholder]</text>
</svg>
