<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="baTitle">
  <title id="baTitle">Before and after result placeholder</title>
  <defs>
    <linearGradient id="baBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2430"/>
      <stop offset="1" stop-color="#151a22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#baBg)"/>

  <!-- Left / BEFORE half -->
  <rect x="0" y="0" width="400" height="500" fill="#0055A2" opacity="0.08"/>
  <text x="200" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" opacity="0.55" letter-spacing="3">BEFORE</text>

  <!-- Right / AFTER half -->
  <rect x="400" y="0" width="400" height="500" fill="#E5A823" opacity="0.08"/>
  <text x="600" y="70" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="bold" fill="#E5A823" opacity="0.85" letter-spacing="3">AFTER</text>

  <!-- Baseline -->
  <rect x="60" y="392" width="680" height="4" fill="#ffffff" opacity="0.25"/>

  <!-- BEFORE bar (shorter) -->
  <rect x="130" y="272" width="140" height="120" rx="6" fill="#0055A2" opacity="0.75"/>
  <text x="200" y="250" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#ffffff" opacity="0.6">[mark]</text>

  <!-- AFTER bar (taller) -->
  <rect x="530" y="152" width="140" height="240" rx="6" fill="#E5A823" opacity="0.9"/>
  <text x="600" y="130" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#E5A823" opacity="0.9">[mark]</text>

  <!-- Dividing line -->
  <line x1="400" y1="30" x2="400" y2="470" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2" stroke-dasharray="8 8"/>

  <!-- Progression arrow across the divide -->
  <g stroke="#E5A823" stroke-width="5" fill="none" opacity="0.9">
    <line x1="300" y1="210" x2="500" y2="210"/>
    <polyline points="478,194 502,210 478,226"/>
  </g>

  <!-- Placeholder label -->
  <text x="400" y="452" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ffffff" opacity="0.55" letter-spacing="1">[before / after placeholder]</text>
</svg>
